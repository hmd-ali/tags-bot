name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Image tag to redeploy (e.g. sha-abc1234). Leave blank for latest."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Image
    if: github.event.inputs.rollback_tag == '' || github.event.inputs.rollback_tag == null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          source: docker-compose.yml
          target: /opt/discord-bot

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -eu
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="${{ github.event.inputs.rollback_tag != '' && github.event.inputs.rollback_tag || 'latest' }}"
            mkdir -p /opt/discord-bot/backups
            cd /opt/discord-bot

            cat > .env.runtime <<'EOF'
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_SERVER_ID=${{ secrets.DISCORD_SERVER_ID }}
            MODERATOR_ROLE_ID=${{ secrets.MODERATOR_ROLE_ID }}
            TAG_ACCESS_ROLE_ID=${{ secrets.TAG_ACCESS_ROLE_ID }}
            EOF
            chmod 600 .env.runtime

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Backup the SQLite DB before touching anything
            if docker volume inspect discord-bot_bot-data >/dev/null 2>&1; then
              docker run --rm \
                -v discord-bot_bot-data:/data \
                -v /opt/discord-bot/backups:/backup \
                alpine sh -c "if [ -f /data/db.sqlite ]; then cp /data/db.sqlite /backup/db-\$(date +%Y%m%d%H%M%S).sqlite; fi"
              # keep last 14 backups only
              ls -1t /opt/discord-bot/backups/*.sqlite 2>/dev/null | tail -n +15 | xargs -r rm --
            fi

            docker compose config >/dev/null
            docker compose pull bot migrate

            # Run migration; on failure, don't touch the running bot
            if ! docker compose run --rm migrate; then
              echo "Migration failed — leaving existing bot container untouched."
              exit 1
            fi

            docker compose up -d --remove-orphans bot

            # Health check: give it a few seconds, then confirm it's actually up
            sleep 8
            if ! docker compose ps bot --status running | grep -q bot; then
              echo "Bot container is not running after deploy!"
              docker compose logs --tail=50 bot
              exit 1
            fi

            docker compose ps
            docker image prune -f
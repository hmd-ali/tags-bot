services:
  bot:
    image: ghcr.io/${IMAGE_NAME}:latest
    container_name: discord-bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/app/data/db.sqlite
    env_file:
      - ./.env.runtime
    volumes:
      - bot-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: ghcr.io/${IMAGE_NAME}:latest
    environment:
      - DATABASE_URL=file:/app/data/db.sqlite
    env_file:
      - ./.env.runtime
    command: ["pnpm", "run", "migrate:deploy"]
    restart: "no"
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
    driver: local